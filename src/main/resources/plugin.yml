name: HeneriaLobby
version: 0.6.0
main: com.heneria.lobby.HeneriaLobbyPlugin
api-version: "1.21"
softdepend:
  - LuckPerms
commands:
  lobbyadmin:
    description: Administrative utilities for HeneriaLobby
    usage: "/lobbyadmin"
    aliases: [la]
    permission: henerialobby.admin
    permission-message: "§cVous n'avez pas la permission."
  friends:
    description: Manage your friends
    usage: "/friends <add|remove|accept|deny|list> [player]"
  msg:
    description: Send a private message to a player
    usage: "/msg <player> <message>"
  r:
    description: Reply to the last private message
    usage: "/r <message>"
  games:
    description: Open the games selector
    aliases: [jeux]
    usage: "/games"
  profil:
    description: Open your profile menu
    usage: "/profil"
  shop:
    description: Open the cosmetics shop
    aliases: [boutique]
    usage: "/shop"
  activites:
    description: Open the lobby activities menu
    usage: "/activites"
  parkour:
    description: Parkour commands
    usage: "/parkour <spawn|checkpoint|top>"
  coins:
    description: Display your coin balance
    usage: "/coins"
  achievements:
    description: Open your achievements menu
    usage: "/achievements"
